<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LAC Regional Climate Policy Toolkit - Inclusive by Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

<style>
/* Universal Font Size Increase and Foolproof Dark Theme */
html, body {
  font-family: 'Roboto', sans-serif;
  font-size: 16px;
  background-color: #0f1117 !important;
  color: #e8e4d9 !important;
  margin: 0;
  padding: 10px;
}

.card {
  background-color: #141720 !important;
  border: 0.5px solid #2a2d38;
  border-radius: 8px;
  padding: 1rem 1.25rem;
  margin-bottom: 12px;
}

.pill-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
.pill { background-color: #1e2230 !important; border-radius: 6px; padding: 10px 12px; }
.bar-track { height: 5px; background-color: #2a2d38; border-radius: 3px; overflow: hidden; margin-top: 6px; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

.mlabel { font-size: 13px; color: #6b7a99; margin-bottom: 2px; }
.mval { font-size: 21px; font-weight: 500; color: #e8e4d9; }
.badge { display: inline-block; font-size: 13px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }
.focus-tag { font-size: 13px; font-weight: 500; padding: 4px 12px; border-radius: 6px; background: rgba(196, 163, 90, 0.2); color: #c4a35a; }

.burden-triple { background-color: #791F1F !important; color: #FCEBEB !important; }
.burden-double { background-color: #633806 !important; color: #FAEEDA !important; }
.burden-single { background-color: #27500A !important; color: #EAF3DE !important; }

.tab-strip { display: flex; border-bottom: 0.5px solid #2a2d38; margin-bottom: 16px; flex-wrap: wrap; gap: 4px; }
.tab { font-size: 15px; font-weight: 500; padding: 10px 18px; cursor: pointer; color: #6b7a99; border-bottom: 2px solid transparent; margin-bottom: -0.5px; background: none; border-top: none; border-left: none; border-right: none; font-family: 'Roboto', sans-serif; }
.tab.active { color: #e8e4d9; border-bottom: 2px solid #378ADD; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.q-item { font-size: 15px; color: #8892a4; padding: 8px 0; border-bottom: 0.5px solid #2a2d38; line-height: 1.6; }
.q-item:last-child { border-bottom: none; }
.rec-item { display: flex; gap: 8px; padding: 10px 0; border-bottom: 0.5px solid #2a2d38; font-size: 15px; color: #8892a4; line-height: 1.6; }
.rec-item:last-child { border-bottom: none; }
.rec-num { font-size: 13px; font-weight: 500; color: #6b7a99; min-width: 22px; padding-top: 2px; }

.case-card { background-color: #1e2230 !important; border-radius: 6px; padding: 14px; margin-bottom: 10px; }
.case-title { font-size: 15px; font-weight: 500; color: #e8e4d9; margin: 0 0 6px; }
.case-body { font-size: 14px; color: #8892a4; line-height: 1.6; margin: 0; }

.brief-section { margin-bottom: 24px; }
.brief-section-title { font-size: 16px; font-weight: 500; color: #e8e4d9; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; border-left: 3px solid #378ADD; padding-left: 10px; }
.brief-body-text { font-size: 15px; color: #8892a4; line-height: 1.7; margin: 0; }

select {
  width: 100%;
  margin-bottom: 10px;
  font-size: 15px;
  padding: 6px;
  font-family: 'Roboto', sans-serif;
  background-color: #1e2230 !important;
  color: #e8e4d9 !important;
  border: 1px solid #2a2d38;
  border-radius: 4px;
}

button#printBriefBtn {
  font-size: 14px;
  padding: 8px 16px;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  background-color: #378ADD !important;
  color: #fff !important;
  border: none;
  border-radius: 4px;
  margin-top: 12px;
  font-weight: 500;
}
button#printBriefBtn:hover { background-color: #2b72b3 !important; }

@media print {
  body * { display: none !important; }
  #tab-brief, #tab-brief * { display: block !important; position: relative !important; background-color: white !important; color: black !important; }
  #printBriefBtn { display: none !important; }
  .brief-section-title { color: black !important; border-left-color: black !important; }
  .brief-body-text { color: black !important; }
}
</style>
</head>

<body>
<h1 style="font-size: 22px; font-weight: 500; color: #e8e4d9; margin: 0 0 16px 4px; letter-spacing: 0.02em;">LAC Regional Climate Policy Advisor</h1>

<div style="padding:0">

<div class="card">
  <p style="font-size:13px;font-weight:500;color:#6b7a99;margin:0 0 12px;text-transform:uppercase;letter-spacing:0.06em">LAC Regional Policy Context</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div><label class="mlabel">LAC Member State</label>
    <select id="countrySelect" onchange="update()">
      <option value="Brazil" selected>Brazil</option>
      <option value="Colombia">Colombia</option>
      <option value="Mexico">Mexico</option>
      <option value="Costa Rica">Costa Rica</option>
      <option value="Chile">Chile</option>
      <option value="Ecuador">Ecuador</option>
      <option value="Peru">Peru</option>
      <option value="Argentina">Argentina</option>
    </select></div>
    <div><label class="mlabel">Policy Instrument</label>
    <select id="policySelect" onchange="update()">
      <option value="energy" selected>Energy pricing reform</option>
      <option value="transport">Transport electrification</option>
      <option value="adaptation">Adaptation investment</option>
      <option value="carbon">Carbon pricing / ETS</option>
      <option value="transition">Just transition programme</option>
    </select></div>
  </div>
</div>

<div class="card">
  <p style="font-size:13px;font-weight:500;color:#6b7a99;margin:0 0 14px;text-transform:uppercase;letter-spacing:0.06em">Regional Risk Profile</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
    <div>
      <div class="pill-grid" id="pillGrid"></div>
      <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
        <span class="badge" id="burdenBadge"></span>
        <span class="focus-tag" id="focusTag"></span>
      </div>
    </div>
    <div style="position:relative;height:220px">
      <canvas id="radarChart" role="img" aria-label="Radar chart of climate risk indices for selected LAC country">Climate risk radar.</canvas>
    </div>
  </div>
</div>

<div class="card">
  <div class="tab-strip">
    <button class="tab active" onclick="switchTab('recs',this)">Recommendations</button>
    <button class="tab" onclick="switchTab('diag',this)">Diagnostic questions</button>
    <button class="tab" onclick="switchTab('cases',this)">Case studies</button>
    <button class="tab" onclick="switchTab('brief',this)" style="color: #c4a35a;">Draft Policy Brief</button>
  </div>

  <div class="tab-panel active" id="tab-recs">
    <div id="recContent"></div>
  </div>

  <div class="tab-panel" id="tab-diag">
    <div id="diagContent"></div>
  </div>

  <div class="tab-panel" id="tab-cases">
    <div id="caseContent"></div>
  </div>

  <div class="tab-panel" id="tab-brief">
    <div class="brief-section">
      <div class="brief-section-title">Executive Summary</div>
      <p class="brief-body-text" id="bExecSummary"></p>
    </div>

    <div class="brief-section">
      <div class="brief-section-title">Policy Context</div>
      <p class="brief-body-text" id="bPolicyContext"></p>
    </div>

    <div class="brief-section">
      <div class="brief-section-title">Recommended Actions</div>
      <p class="brief-body-text" id="bActions"></p>
    </div>

    <div class="brief-section">
      <div class="brief-section-title">Implementation Plan</div>
      <p class="brief-body-text" id="bPlan"></p>
    </div>

    <div class="brief-section">
      <div class="brief-section-title">Monitoring Indicators</div>
      <p class="brief-body-text" id="bIndicators"></p>
    </div>

    <div class="brief-section">
      <div class="brief-section-title">Relevant Cases in Other Countries</div>
      <div class="brief-body-text" id="bCases"></div>
    </div>
    
    <div style="text-align: right;">
      <button id="printBriefBtn" onclick="window.print()">Print Official Briefing</button>
    </div>
  </div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const countries={
  Brazil:     {climate:6.3, social:5.5, transition:5.0, focus:"Just transition & workforce reskilling"},
  Colombia:   {climate:8.5, social:6.8, transition:5.4, focus:"Hydropower resilience & energy poverty"},
  Mexico:     {climate:7.1, social:6.2, transition:6.5, focus:"Smallholder agricultural adaptation"},
  Costa_Rica: {climate:4.5, social:3.2, transition:5.8, focus:"1.5°C compatible decarbonization"},
  Chile:      {climate:5.2, social:3.0, transition:7.2, focus:"Critical minerals & clean transport"},
  Ecuador:    {climate:6.8, social:7.0, transition:5.5, focus:"Equitable fuel subsidy reform"},

// MULTI-DIMENSIONAL RECOMMENDATION MATRIX (Country x Policy)
const policyRecs={

    adaptation: ["Direct emergency climate funds to flood-prone urban zones in Rio Grande do Sul and coastal capitals.", "Scale up women-led agroforestry networks across Amazonian border zones to protect vital carbon sinks.", "Integrate community early warning systems with national civil defense dispatch grids."],

  },

    energy: ["Ring-fence thermal generation subsidies during extreme El Niño drought phases to shield household tariffs.", "Accelerate utility-scale solar deployment to reduce systemic vulnerability to hydropower generation drops.", "Guarantee baseline vital electricity quotas for rural displaced populations."],
    transport: ["Expand electric bus rapid transit (BRT) feeder networks into high-density informal hillside settlements.", "Exempt essential rural agricultural freight from carbon surcharges to prevent food price inflation.", "Subsidize electric two-wheeler adoption for informal delivery and urban service workers."],
    adaptation: ["Target multi-hazard early warning investments toward high-risk Pacific coastal zones and river basins.", "Deploy decentralized solar pumping systems to secure clean water access during prolonged dry spells.", "Strengthen rural health posts ahead of projected vector-borne disease expansion."],
    carbon: ["Structure carbon tax exemptions for vulnerable agricultural cooperatives and food producers.", "Dedicate 40% of national carbon tax collections to rural ecosystem restoration and clean cooking grants.", "Align corporate carbon accounting standards with Andean Community trade protocols."],
    transition: ["Sequence coal mine phase-down schedules in La Guajira and Cesar with localized economic replacement plans.", "Fund technical training scholarships for youth in historically fossil-dependent mining provinces.", "Establish regional economic development corporations to attract clean manufacturing FDI."]
  },

    energy: ["Maintain targeted lifeline electricity tariffs for heat-exposed northern desert municipalities.", "Reinvest state energy revenues into decentralized solar harvesting projects for rural smallholders.", "Deploy smart metering grids to eliminate arbitrary billing spikes in low-income suburban districts."],
    transport: ["Coordinate cross-border freight decarbonization standards along major US-Mexico industrial trade arteries.", "Subsidize clean public transit integration within sprawling industrial manufacturing hubs (Bajío and Monterrey).", "Protect rural car-dependent agricultural workers from sudden fuel excise tax hikes."],
    adaptation: ["Scale up coastal wetland restoration (chinampa models) across Gulf of Mexico communities.", "Provide climate-contingent crop insurance for Veracruz smallholder coffee growers facing severe heat stress.", "Expand municipal heatwave shelters equipped with independent solar cooling systems."],
    carbon: ["Apply expenditure-based incidence models to prevent regressive impacts on bottom-quintile households.", "Recycle carbon pricing revenues into clean agricultural equipment rebates for ejido farmers.", "Harmonize domestic industrial emissions pricing with North American trade agreements."],
    transition: ["Partner with automotive manufacturing clusters to retool assembly lines for EV component exports.", "Establish green technical certification councils within major national technical university networks.", "Provide targeted income stabilization funds for traditional agricultural labourers displaced by drought."]

    transport: ["Accelerate national electric train (GAM) deployment to decongest metropolitan San José transit corridors.", "Provide zero-interest financing for rural eco-tourism operators to electrify passenger transport fleets.", "Expand dedicated EV charging infrastructure into remote protected area corridors."],

  },
  Chile: {
    energy: ["Shield northern industrial mining grids from volatile global commodity pricing via long-term solar PPAs.", "Provide direct winter heating subsidies for southern regions transitioning away from residential firewood.", "Expand smart grid interconnections to transmit Atacama solar generation to central demand centers."],

  Ecuador: {
    energy: ["Replace blanket fuel subsidies with targeted biometric digital cash transfers for vulnerable households.", "Ring-fence utility revenues to expand rural Amazonian electrification via micro-hydro and solar installations.", "Establish clear transparent consultative price-setting formulas to build lasting social trust."],

    carbon: ["Structure industrial emissions pricing to protect the competitiveness of labor-intensive export sectors.", "Recycle green tax collections into direct nutritional and health safety nets for extreme poor strata.", "Enforce strict environmental liability compliance across formal and informal mining frontiers."],

  },

    transport: ["Incentivize natural gas and electric transition for heavy agricultural freight fleets across the Pampas.", "Expand integrated metropolitan transit ticketing subsidies for peri-urban workers in Greater Buenos Aires.", "Protect regional agricultural supply chains from uncoordinated provincial transport surcharges."],
    adaptation: ["Strengthen agricultural risk management and drought insurance buffers for major grain-producing provinces.", "Invest in urban drainage and flood defenses across vulnerable Paraná river basin municipalities.", "Expand national meteorological monitoring grids across agricultural and Patagonian frontiers."],
    carbon: ["Conduct rigorous macro-financial stress testing prior to introducing industrial carbon pricing tiers.", "Design carbon revenue recycling mechanisms to bolster federal fiscal reserves and social welfare budgets.", "Coordinate corporate emissions accounting with regional Mercosur trade partners."],
    transition: ["Sequence Vaca Muerta and conventional oil field labor transitions with long-term regional development plans.", "Establish bipartite green skills councils connecting industrial trade unions with clean energy developers.", "Provide targeted credit guarantees for SMEs retooling manufacturing processes for clean technologies."]
  }

const caseStudies={
  Brazil:     ["Amazon Reforestation & Women","Women-led reforestation networks in Virunga and Central Africa demonstrate how nature-based solutions generate livelihoods while protecting carbon sinks — a direct operational parallel for Amazon transition strategies.","Hydropower Drought Vulnerability","Colombia's reliance on hydropower (62%) illustrates how drought-driven generation shortfalls cascade into energy poverty, reflecting Brazil's identical hydro-generation exposure."],
  Colombia:   ["Hydropower Dependence","Relying on hydropower for over 60% of electricity exposes national grids to severe climate variability. Prolonged droughts diminish reservoir volumes, requiring urgent solar and wind diversification.","Pakistan Flooding Analogy","Pakistan's 2023 floods (affecting 33 million people) illustrate the compounding threat of extreme hydrometeorological events on populations where poverty limits recovery capacity."],
  Mexico:     ["Gulf of Mexico Coastal Wetlands","A landmark gender-sensitive adaptation project integrating stilt housing, chinampas, and women-led rainwater harvesting enterprises (Gotita de Agua) to build community resilience.","Veracruz Coffee Stressors","Rising temperatures and erratic rainfall in Coatepec and Fortín threaten smallholder yields and exacerbate coffee leaf rust outbreaks, endangering 86,000 family livelihoods."],
  Costa_Rica: ["1.5°C Compatible Leadership","One of only eight economies globally aligned with 1.5°C NDC pathways. Sustaining this leadership requires international climate finance to offset domestic transition inequities.","Green Workforce Gaps","Despite robust net-zero targets, highly educated urban workers capture emerging green opportunities while low-skilled rural workers face structural placement barriers."],
  Chile:      ["Santiago Fuel Switching","Historical air quality and environmental policies driving urban fuel switching to natural gas demonstrate the critical need to manage price trade-offs for commercial fleets.","Critical Transition Minerals","As a major supplier of copper and lithium, national value chains must balance surging global clean-tech demand with local ecological protection and Indigenous land rights."],
  Ecuador:    ["Fuel Subsidy Backlash","Attempts to remove transport fuel subsidies triggered nationwide protests by Indigenous groups and low-income communities, forcing policy reversals to maintain social stability.","Gilets Jaunes Precedent","France's 2018 yellow vest protests against regressive carbon taxes on diesel underscore the universal requirement to sequence social compensation before price enforcement."],
  Peru:       ["Disaster-Driven Poverty","Regional economic literature demonstrates that experiencing just one additional climate disaster per year is linked to a 16–23% surge in local poverty rates.","Andean Glacial Retreat","Compounding heat anomalies threaten mountain water storage, directly jeopardizing downstream agricultural productivity and municipal water grids."],
  Argentina:  ["Macro-Financial Transition","Economic decarbonization models indicate that uncoordinated transition policies risk stranding regional industrial assets and straining fiscal debt service capacities.","Coal Phase-Out Protests","European precedents in Germany and Poland demonstrate that sequencing regional economic diversification and worker buyouts is the determinant of transition acceptance."]
};

// MULTI-DIMENSIONAL DYNAMIC DIAGNOSTIC ENGINE (Country x Policy)
function getDiagnostics(countryName, policyKey) {
  const pLabels = {energy:"energy pricing reforms", transport:"transport electrification", adaptation:"adaptation investments", carbon:"carbon pricing mechanisms", transition:"just transition programmes"};
  const pText = pLabels[policyKey] || "climate action";
  return {
    climate: [
      `Which low-lying or heat-exposed informal settlements in ${countryName} face compounded physical hazards under proposed ${pText}?`,
      `Are meteorological early warning networks operational across remote agricultural and Indigenous frontiers in ${countryName}?`,
      `How do regional drought or flood anomalies in ${countryName} threaten localized infrastructure required for this policy?`
    ],
    social: [
      `What proportion of bottom-quintile households in ${countryName} lack formal social protection buffers against ${pText}?`,
      `Are women-led community networks and informal care workers in ${countryName} actively engaged in policy governance?`,
      `Do proposed fiscal or tariff adjustments in ${countryName} protect rural smallholders from sudden living cost inflation?`
    ],
    transition: [
      `Which regional extraction or manufacturing clusters in ${countryName} face stranding or contraction under ${pText}?`,
      `Does the regional workforce in ${countryName} possess the formal schooling required to transition into emerging green roles?`,
      `What municipal fiscal mechanisms exist in ${countryName} to cushion local budgets against shifting commodity revenues?`
    ]
  };
}

function getBurden(s){
  const h=[s.climate, s.social, s.transition].filter(v=>v>=6.5).length;
  if(h===3)return{label:"Triple burden", cls:"burden-triple"};
  if(h===2)return{label:"Double burden", cls:"burden-double"};
  return{label:"Moderate risk", cls:"burden-single"};
}
function barColor(v){return v>=7.5?"#E24B4A":v>=5.5?"#EF9F27":"#639922"}

let radarInstance=null;

function switchTab(id,btn){
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  btn.classList.add("active");
}

function update(){
  const rawC=document.getElementById("countrySelect").value;
  const c = rawC === "Costa Rica" ? "Costa_Rica" : rawC;
  const displayC = rawC;
  const p=document.getElementById("policySelect").value;
  const s=countries[c];

  document.getElementById("pillGrid").innerHTML=[
    {label:"Climate exposure", val:s.climate},
    {label:"Social vulnerability", val:s.social},
    {label:"Worker transition", val:s.transition}
  ].map(d=>`<div class="pill"><div class="mlabel">${d.label}</div><div class="mval">${d.val.toFixed(1)}<span style="font-size:12px;color:#6b7a99">/10</span></div><div class="bar-track"><div class="bar-fill" style="width:${d.val*10}%;background:${barColor(d.val)}"></div></div></div>`).join("");

  const burden=getBurden(s);
  const b=document.getElementById("burdenBadge");
  b.textContent=burden.label; b.className="badge "+burden.cls;
  document.getElementById("focusTag").textContent=s.focus;

  const currentRecs = (policyRecs[c] && policyRecs[c][p]) ? policyRecs[c][p] : ["Ensure stakeholder alignment across regional implementation agencies.", "Establish equitable monitoring frameworks prior to policy execution.", "Protect vulnerable socioeconomic strata from regressive transition trade-offs."];

  document.getElementById("recContent").innerHTML=currentRecs.map((r,i)=>`<div class="rec-item"><span class="rec-num">${i+1}.</span><span>${r}</span></div>`).join("");

  // DYNAMIC 2D MATRIX LOOKUP FOR DIAGNOSTIC QUESTIONS
  const currentDiags = getDiagnostics(displayC, p);

  // Updated Subheader text mapping: transition category prints explicitly as "Worker transition"
  document.getElementById("diagContent").innerHTML=Object.entries(currentDiags).map(([key,qs])=>`
    <div style="margin-bottom:12px">
      <p style="font-size:14px;font-weight:500;margin:0 0 6px;color:#e8e4d9">${key==="climate"?"Climate exposure":key==="social"?"Social vulnerability":"Worker transition"}</p>
      ${qs.map(q=>`<div class="q-item">${q}</div>`).join("")}
    </div>`).join("");

  const cs=caseStudies[c];
  document.getElementById("caseContent").innerHTML=`
    <div class="case-card"><p class="case-title">${cs[0]}</p><p class="case-body">${cs[1]}</p></div>
    <div class="case-card"><p class="case-title">${cs[2]}</p><p class="case-body">${cs[3]}</p></div>`;

  const gc="rgba(255,255,255,0.12)";
  const lc="#B4B2A9";
  const rd={labels:["Climate\nexposure","Social\nvulnerability","Worker\ntransition"], datasets:[{label:displayC, data:[s.climate, s.social, s.transition], backgroundColor:"rgba(55,138,221,0.25)", borderColor:"#378ADD", borderWidth:2, pointBackgroundColor:"#378ADD", pointRadius:4}]};
  
  const ro={responsive:true, maintainAspectRatio:false, scales:{r:{min:0, max:10, ticks:{stepSize:2, display:false}, grid:{color:gc}, angleLines:{color:gc}, pointLabels:{color:lc, font:{size:13, family:'Roboto'}}}}, plugins:{legend:{display:false}}};

  if(radarInstance){radarInstance.data=rd; radarInstance.options=ro; radarInstance.update();}
  else{radarInstance=new Chart(document.getElementById("radarChart"), {type:"radar", data:rd, options:ro});}

  const labels={energy:"energy pricing reform", transport:"transport electrification", adaptation:"adaptation investment", carbon:"carbon pricing / ETS", transition:"just transition programme"};
  
  document.getElementById("bExecSummary").innerText = `This regional briefing document synthesizes the structural equity safeguards required for ${displayC} as it advances its national execution of ${labels[p]}. In strict alignment with UNESCO MOST findings, priority interventions are targeted toward: ${s.focus}.`;
  
  document.getElementById("bPolicyContext").innerText = `${displayC} exhibits an underlying physical climate exposure score of ${s.climate.toFixed(1)}/10, alongside a baseline social vulnerability profile of ${s.social.toFixed(1)}/10 and a worker transition risk matrix evaluated at ${s.transition.toFixed(1)}/10. This aggregated metric places the economy under a structural classification of "${burden.label}".`;
  
  document.getElementById("bActions").innerHTML = currentRecs.map((r, i) => `<strong>Action ${i+1}:</strong> ${r}<br><br>`).join("");
  
  document.getElementById("bPlan").innerText = `Operationalization mandates cross-ministerial coordination between Environment, Finance, and Social Development entities. Compensatory revenue recycling mechanisms must execute concurrently with decarbonization reforms to shield vulnerable strata from secondary inequality risks.`;
  
  document.getElementById("bIndicators").innerText = `Core baseline metrics will track: 1) Real household purchasing power within the bottom two income quintiles, 2) Accessibility rates to multi-hazard early warning networks, and 3) Sectoral job retention and green technical placement rates across affected worker demographics.`;
  
  document.getElementById("bCases").innerHTML = `
    <p class="brief-body-text" style="margin-bottom: 12px;">To ensure evidence-grounded deployment, technical teams should reference these comparative precedents highlighted in the core UNESCO framework:</p>
    <div style="margin-left: 10px; border-left: 2px dashed #4a5568; padding-left: 14px;">
      <p class="brief-body-text"><strong>Comparative Precedent 1: ${cs[0]}</strong><br>${cs[1]}</p><br>
      <p class="brief-body-text"><strong>Comparative Precedent 2: ${cs[2]}</strong><br>${cs[3]}</p>
    </div>`;
}

update();
